<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Library · @dicarvalho.prof</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Star canvas -->
    <canvas id="star-canvas"></canvas>

    <header class="main-header">
        <div class="header-inner">
            <a href="https://sites.google.com/view/profdiandradeingles" class="back-link-top">
                <i class="fas fa-arrow-left"></i> Voltar ao site
            </a>
            <div class="section-eyebrow">@dicarvalho.prof</div>
            <h1 class="brand-title">Biblioteca de <em>aprendizado</em></h1>
            <p class="brand-subtitle">Materiais gratuitos para os nossos alunos · Clique e baixe</p>

            <div class="fire-wrap">
                <div class="fire-glow"></div>
                <div class="fire-container">
                    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
                    <dotlottie-wc src="https://lottie.host/b75eaae9-c96c-4d98-b050-e09bb4a57387/OMo9kLFmlT.lottie" style="width:150px;height:150px" autoplay loop></dotlottie-wc>
                </div>
            </div>
        </div>
    </header>

    <main id="library-container">
        <div id="loading-message"><span class="loading-dot"></span> Carregando livros...</div>
        <div id="books-grid"></div>
    </main>

    <footer class="lib-footer">
        <div class="footer-inner">
            <div class="footer-brand">@dicarvalho<span>.</span>prof</div>
            <p class="footer-copy">© 2025 Diandra Carvalho · Ciência aplicada ao ensino</p>
            <div class="footer-links">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="https://wa.me/5516993272278"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
    // ── STAR FIELD ──────────────────────────────────────────────
    const canvas = document.getElementById('star-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, stars = [];
    const mouse = { x: -9999, y: -9999 };

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = document.body.scrollHeight;
    }

    class Star {
        constructor() { this.reset(true); }
        reset(initial) {
            this.x    = Math.random() * W;
            this.y    = initial ? Math.random() * H : Math.random() * H;
            this.r    = Math.random() * 1.2 + 0.3;
            this.base = Math.random() * 0.5 + 0.2;
            this.op   = this.base;
            this.speed = (Math.random() - 0.5) * 0.08;
            this.twinkleSpeed = Math.random() * 0.008 + 0.003;
            this.twinkleOffset = Math.random() * Math.PI * 2;
            // slight warm tint for a few stars
            this.warm = Math.random() < 0.15;
        }
        update(t) {
            // twinkle
            this.op = this.base + Math.sin(t * this.twinkleSpeed + this.twinkleOffset) * (this.base * 0.6);
            // mouse proximity brightening
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 120) {
                this.op = Math.min(1, this.op + (1 - dist/120) * 0.5);
            }
            // very slow drift
            this.x += this.speed;
            if (this.x < 0)  this.x = W;
            if (this.x > W)  this.x = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
            const color = this.warm
                ? `rgba(255,230,180,${this.op})`
                : `rgba(255,255,255,${this.op})`;
            ctx.fillStyle = color;
            ctx.fill();
        }
    }

    function init() {
        resize();
        stars = [];
        const count = Math.floor((W * H) / 8000);
        for (let i = 0; i < Math.min(count, 200); i++) stars.push(new Star());
    }

    let t = 0;
    function animate() {
        ctx.clearRect(0, 0, W, H);
        t++;
        stars.forEach(s => { s.update(t); s.draw(); });
        requestAnimationFrame(animate);
    }

    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY + window.scrollY; });
    window.addEventListener('resize', () => { init(); });
    // re-init when books load (page grows)
    const observer = new MutationObserver(() => { resize(); });
    observer.observe(document.getElementById('books-grid'), { childList: true });

    init();
    animate();
    </script>
</body>
</html>
